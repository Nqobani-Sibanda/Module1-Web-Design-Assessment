<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible-Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form method="post" action="#">

      <fieldset>
        <legend>Contact Information</legend>
        <label for="fullName">FullName</label>
        <input type="text" id="fullNmae" placeholder="Please type your full name" required>

         <label for="email">Email></label>
         <input type="email" id="email" placeholder="Please Insert a valid email" required>

         <label for="subject">Subject</label>
         <input type="text" id="subject" placeholder="What are you contacting about">

         <label for="message">Message</label>
         <textarea id="message">

         </textarea>
      </fieldset>

      <button type="submit">Send</button>
    </form>
</body>
</html>
